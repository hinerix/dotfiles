$color = rgba(239, 241, 245, 1.0)
$inner_color = rgba(239, 241, 245, 0.8)
$outer_color = rgba(76, 79, 105, 1.0)
$font_color = rgba(76, 79, 105, 1.0)
$check_color = rgba(32, 159, 181, 1.0)
$fail_color = rgba(210, 15, 57, 1.0)

# auth {
#    fingerprint:enabled = true
# }

background {
    monitor =
    color = $color
    path = 
    blur_passes = 3
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = linear, 1, 1, 0, 0

    animation = fade, 1, 3, easeOutQuint
    animation = inputFieldColors, 1, 3, easeOutQuint
    animation = inputFieldDots, 1, 2, linear
}

input-field {
    monitor =
    size = 600, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = CaskaydiaMono Nerd Font
    font_color = $font_color

    placeholder_text = Enter Password
    check_color = $check_color
    fail_color = $fail_color
    fail_text = <i>$PAMFAIL ($ATTEMPTS)</i>
    fail_transition = 300

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}
